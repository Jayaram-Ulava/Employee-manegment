<div class="container-fluid mt-4 main-bg p-4">

  <!-- TOP BAR -->
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    
    <h4 class="title">Employee Dashboard</h4>

    <div class="d-flex gap-2">
      <input type="text"
             class="form-control search-box"
             placeholder="🔍 Search employee..."
             (keyup)="search()"
             [(ngModel)]="searchemp">

      <span class="badge bg-dark total-badge">
        Total: {{ totleemployes.length }}
      </span>
    </div>

  </div>

  <!-- TABLE -->
  <div class="table-card">

    <table class="table table-dark table-hover align-middle">

      <thead>
        <tr>
          <th>ID</th>
          <th (click)="sortname('name')" class="sortable">Name</th>
          <th (click)="sortname('company')" class="sortable">Company</th>
          <th (click)="sortname('role')" class="sortable">Role</th>
          <th (click)="sortname('package')" class="sortable">Package</th>
          <th>Email</th>
          <th>Gender</th>
          <th (click)="sortname('city')" class="sortable">City</th>
          <th>Mode</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let emp of totleemployes">

          <td>{{ emp.id }}</td>

          <td class="fw-bold">{{ emp.name || '-' }}</td>

          <td>{{ emp.company || '-' }}</td>

          <td>{{ emp.role || '-' }}</td>

          <td>
            <span [ngClass]="emp.package > 100000 ? 'high-salary' : 'low-salary'">
              ₹ {{ emp.package }}
            </span>
          </td>

          <td class="text-muted">{{ emp.email }}</td>

          <td>{{ emp.gender }}</td>

          <td>{{ emp.address?.city || '-' }}</td>

          <td>
            <span class="badge mode-badge">
              {{ emp.workMode }}
            </span>
          </td>

          <!-- ACTIONS -->
          <td class="text-center">

            <button class="btn btn-sm btn-outline-primary me-1"
                    routerLink="/dashbord/editeemploye/{{emp.id}}">
              ✏️
            </button>

            <button class="btn btn-sm btn-outline-danger me-1"
                    (click)="deleteemp(emp.id)">
              🗑️
            </button>

            <button class="btn btn-sm btn-outline-light"
                    routerLink="/dashbord/viewempolye/{{emp.id}}">
              👁️
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- PAGINATION -->
  <div class="d-flex justify-content-center mt-4 gap-2 flex-wrap">

    <button class="btn btn-outline-light" (click)="pageprev()">Prev</button>

    <button *ngFor="let emp of [].constructor(10); let i=index"
            class="btn btn-page"
            (click)="pageemp(i + 1)">
      {{ i + 1 }}
    </button>

    <button class="btn btn-outline-light" (click)="nextemp()">Next</button>

  </div>

</div>
