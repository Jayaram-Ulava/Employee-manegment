<div class="container mt-5">
  <div class="card shadow-lg border-0">
    
    <!-- Header -->
    <div class="card-header bg-success text-white text-center">
      <h3>{{ updateemp ? 'Update Employee' : 'Create Employee' }}</h3>
    </div>

    <!-- Form -->
    <div class="card-body">
      <form [formGroup]="empform">

        <div class="row">

          <!-- Name -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" formControlName="name">
          </div>

          <!-- Email -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>

          <!-- DOB -->
          <div class="col-md-6 mb-3">
            <label class="form-label">DOB</label>
            <input type="date" class="form-control" formControlName="dob">
          </div>

          <!-- Gender -->
          <div class="col-md-6 mb-3">
            <label class="form-label d-block">Gender</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" value="male" formControlName="gender">
              <label class="form-check-label">Male</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" value="female" formControlName="gender">
              <label class="form-check-label">Female</label>
            </div>
          </div>

          <!-- Company -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Company</label>
            <input type="text" class="form-control" formControlName="company">
          </div>

          <!-- Role -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Role</label>
            <input type="text" class="form-control" formControlName="role">
          </div>

          <!-- Package -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Package</label>
            <input type="number" class="form-control" formControlName="package">
          </div>

        </div>

        <hr>

        <!-- Address -->
        <h5 class="section-title">Address Details</h5>
        <div formGroupName="address" class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Address Line</label>
            <input type="text" class="form-control" formControlName="addressLine">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">State</label>
            <input type="text" class="form-control" formControlName="state">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Pincode</label>
            <input type="text" class="form-control" formControlName="pincode">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">City</label>
            <input type="text" class="form-control" formControlName="city">
          </div>
        </div>

        <hr>

        <!-- Work Mode -->
        <h5 class="section-title">Work Mode</h5>
        <div class="mb-3">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" value="workFromOffice" formControlName="workMode">
            <label class="form-check-label">Office</label>
          </div>

          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" value="remote" formControlName="workMode">
            <label class="form-check-label">Remote</label>
          </div>
        </div>

        <!-- Conditional Fields -->
        <div *ngIf="empform.get('workMode')?.value == 'workFromOffice'" class="mb-3">
          <label class="form-label">Travel Fee</label>
          <input type="number" class="form-control" formControlName="travelFee">
        </div>

        <div *ngIf="empform.get('workMode')?.value == 'remote'" class="mb-3">
          <label class="form-label">Wifi Bill</label>
          <input type="number" class="form-control" formControlName="wifiBill">
        </div>

        <hr>

        <!-- Hikes -->
        <h5 class="section-title">Hikes</h5>
        <button type="button" class="btn btn-primary mb-3" (click)="addHike()">Add Hike</button>

        <div formArrayName="hikes">
          <div *ngFor="let hike of hikesarry.controls; let i = index" [formGroupName]="i" class="card p-3 mb-3">
            
            <h6>Hike {{ i + 1 }}</h6>

            <div class="row">
              <div class="col-md-6">
                <label class="form-label">Year</label>
                <input type="text" class="form-control" formControlName="year">
              </div>

              <div class="col-md-6">
                <label class="form-label">Hike %</label>
                <input type="number" class="form-control" formControlName="hikepercentage">
              </div>
            </div>

            <button type="button" class="btn btn-danger btn-sm mt-2" (click)="removeHike(i)">
              Remove
            </button>

          </div>
        </div>

        <!-- Submit -->
        <div class="text-center mt-4">
          <button type="button" class="btn btn-success px-4" (click)="submit()">
            {{ updateemp ? 'Update' : 'Submit' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
